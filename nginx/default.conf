server {
    listen 80;
    server_name _; # Replace with your domain, e.g., code-clash.example.com

    # We use an include file to dynamically swap the upstream port.
    resolver 127.0.0.11 valid=10s ipv6=off;
    # The deploy.sh script updates this file to contain `set $upstream_port 3001;` or `set $upstream_port 3002;`
    include /etc/nginx/conf.d/code-clash.inc;

    location / {
        proxy_pass http://host.docker.internal:$upstream_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support if needed later
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
